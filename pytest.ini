[pytest]
addopts = --html=report.html
    --self-contained-html -v
    --clean-alluredir
testpaths = tests
markers =
    login: тесты связанные с авторизацией/логином
    positive: позитивные тесты
    negative: негативные тесты
    flaky: флакающие (периодически падающие) тесты
    api: API тесты
    ui
    smoke
    auth
log_cli = true
log_cli_level = INFO

log_file = logs/pytest.log
log_file_level = DEBUG

log_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
